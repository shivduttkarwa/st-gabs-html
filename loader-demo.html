    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #001E14; }

    .demo-hero {
      position: fixed;
      inset: 0;
      background: #001E14;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }
    .demo-hero-inner { text-align: center; padding: 2rem; }
    .demo-hero-eyebrow {
      color: #96A50B;
      font-family: 'GT Super Display', serif;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }
    .demo-hero-title {
      font-family: 'GT Super Display', serif;
      font-size: 5rem;
      line-height: 0.95;
      letter-spacing: -0.04em;
      font-weight: 300;
      color: rgba(255,255,255,0.75);
      margin-bottom: 3.5rem;
    }
    .demo-hero-title em {
      font-style: italic;
      color: rgba(150,165,11,0.6);
    }
    .replay-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: transparent;
      border: 1px solid rgba(150,165,11,0.3);
      color: rgba(150,165,11,0.6);
      padding: 0.75rem 2rem;
      font-family: 'GT Super Display', serif;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.3s ease, border-color 0.3s ease;
    }
    .replay-btn:hover {
      color: #96A50B;
      border-color: rgba(150,165,11,0.7);
    }

    .trac-preloader {
      position: fixed;
      inset: 0;
      background: #003F2A;
      z-index: 9999999;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: transform 0.9s cubic-bezier(0.76, 0, 0.24, 1);
    }
    .trac-preloader.wipe-out { transform: translateY(-100%); }

    .preloader-svg-combined {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
      z-index: 2;
    }
    .preloader-svg-combined path { fill: none; stroke-dasharray: 1; stroke-dashoffset: 1; }

    .preloader-text-wrap {
      position: relative;
      width: min(66.875rem, 90vw);
      text-align: center;
      box-sizing: border-box;
      animation: pl-enter 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.15s both;
    }
    @keyframes pl-enter {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    .preloader-text {
      color: rgba(150, 165, 11, 0.20);
      font-family: 'GT Super Display', serif;
      font-size: clamp(1.75rem, 6.25vw, 5.625rem);
      line-height: 1.1;
      font-weight: 400;
      letter-spacing: -0.03em;
      margin: 0;
      word-wrap: break-word;
    }

    .pl-word {
      color: rgba(150, 165, 11, 0.20);
      transition: color 1s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      text-shadow: none;
    }
    .pl-word.pl-lit {
      color: #ffffff;
      z-index: 10;
      animation: pl-word-glow 1.35s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    @keyframes pl-word-glow {
      0% { text-shadow: 0 2px 18px rgba(255, 255, 255, 0); }
      45% { text-shadow: 0 1px 7px rgba(255, 255, 255, 0.18); }
      100% { text-shadow: 0 2px 18px rgba(255, 255, 255, 0); }
    }

    .preloader-br { display: block; }
    @media (min-width: 1800px) {
      .preloader-text { font-size: 5.625rem; }
    }
    @media (min-width: 1450px) and (max-width: 1799px) {
      .preloader-text { font-size: 4.8rem; }
    }
    @media (min-width: 1380px) and (max-width: 1449px) {
      .preloader-text { font-size: 4.5rem; }
    }
    @media (min-width: 1200px) and (max-width: 1379px) {
      .preloader-text { font-size: 3.9rem; }
    }
    @media (max-width: 767px) {
      .preloader-br { display: none; }
      .preloader-text,
      .pl-word {
        color: rgba(150, 165, 11, 0.34);
      }
      .pl-word.pl-lit {
        color: #ffffff;
      }
    }
    @media (max-width: 575px) { .preloader-text { letter-spacing: -0.01em; } }
  </style>
</head>
<body>

  <section class="demo-hero">
    <div class="demo-hero-inner">
      <h1 class="demo-hero-title">HERO SECTION</h1>
      <button class="replay-btn" onclick="location.reload()">↺ Replay</button>
    </div>
  </section>

  <div id="trac-preloader" class="trac-preloader" aria-hidden="true">
    <div class="preloader-text-wrap">
      <p class="preloader-text">
        From Wagga to the world,<br class="preloader-br">
        we <span id="pl-explore" class="pl-word">explore</span>, <span id="pl-discover" class="pl-word">discover</span> and<br class="preloader-br">
        <span id="pl-grow" class="pl-word">grow</span> through pathways that<br class="preloader-br">
        build <span id="pl-character" class="pl-word">character</span>, <span id="pl-capability" class="pl-word">capability</span><br class="preloader-br">
        and <span id="pl-confidence" class="pl-word">confidence</span>.
      </p>
    </div>
    <svg class="preloader-svg-combined"
         xmlns="http://www.w3.org/2000/svg"
         viewBox="0 0 1225 912"
         preserveAspectRatio="xMinYMid meet"
         fill="none"
         aria-hidden="true">
      <path id="preloader-path-1"
            pathLength="1"
            d="M 0 190
               C 110 230, 220 220, 330 165
               C 430 115, 505 70, 595 95
               C 670 116, 690 178, 652 255
               C 622 316, 610 370, 608 425
               C 606 486, 638 526, 720 540
               C 835 560, 1000 505, 1105 522
               C 1190 536, 1242 590, 1222 660
               C 1195 755, 1035 775, 875 790
               C 740 803, 645 812, 615 858
               C 602 878, 600 892, 598 910"
            stroke="#96A50B"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            vector-effect="non-scaling-stroke"
            fill="none"/>
    </svg>
  </div>

  <script>
  (function () {
    'use strict';

    var preloader = document.getElementById('trac-preloader');
    if (!preloader) return;

    document.documentElement.style.overflow = 'hidden';

    var DELAY     = 100;
    var DURATION  = 3500;
    var HOLD     = 0;
    var WIPE_DUR = 900;
    var w = window.innerWidth;
    var h = window.innerHeight;

    var WORDS_1440 = [
      { id: 'pl-explore'   , ms: 885 },
      { id: 'pl-discover'  , ms: 1085 },
      { id: 'pl-grow'      , ms: 1240 },
      { id: 'pl-character' , ms: 1475 },
      { id: 'pl-capability', ms: 1975 },
      { id: 'pl-confidence', ms: 2400 },
    ];
     var WORDS_1920 = [
      { id: 'pl-explore'   , ms: 685 },
      { id: 'pl-discover'  , ms: 885 },
      { id: 'pl-grow'      , ms: 940 },
      { id: 'pl-character' , ms: 1175 },
      { id: 'pl-capability', ms: 1975 },
      { id: 'pl-confidence', ms: 2600 },
    ];
    var WORDS_1500 = [
      { id: 'pl-explore'   , ms: 485 },
      { id: 'pl-discover'  , ms: 685 },
      { id: 'pl-grow'      , ms: 800 },
      { id: 'pl-character' , ms: 1075 },
      { id: 'pl-capability', ms: 1775 },
      { id: 'pl-confidence', ms: 2100 },
    ];
    var WORDS_1280 = [
      { id: 'pl-explore'   , ms: 635 },
      { id: 'pl-discover'  , ms: 835 },
      { id: 'pl-grow'      , ms: 935 },
      { id: 'pl-character' , ms: 1200 },
      { id: 'pl-capability', ms: 1750 },
      { id: 'pl-confidence', ms: 2200 },
    ];
    var WORDS_DEFAULT = [
      { id: 'pl-explore'   , ms: 685 },
      { id: 'pl-discover'  , ms: 785 },
      { id: 'pl-grow'      , ms: 940 },
      { id: 'pl-character' , ms: 1075 },
      { id: 'pl-capability', ms: 1375 },
      { id: 'pl-confidence', ms: 1800 },
    ];
    var WORDS_MOBILE = [
      { id: 'pl-explore'   , ms: 585 },
      { id: 'pl-discover'  , ms: 685 },
      { id: 'pl-grow'      , ms: 840 },
      { id: 'pl-character' , ms: 875 },
      { id: 'pl-capability', ms: 1175 },
      { id: 'pl-confidence', ms: 1600 },
    ];

    var DRAW_SPEED_STOPS_DESKTOP = [
      { time: 0.00, progress: 0.00 },
      { time: 0.14, progress: 0.28 },
      { time: 0.78, progress: 0.66 },
      { time: 1.00, progress: 1.00 }
    ];
    var DRAW_SPEED_STOPS_1920 = [
      { time: 0.00, progress: 0.00 },
      { time: 0.14, progress: 0.28 },
      { time: 0.60, progress: 0.62 },
      { time: 0.80, progress: 0.68 },
      { time: 1.00, progress: 1.00 }
    ];
    var DRAW_SPEED_STOPS_1280 = [
      { time: 0.00, progress: 0.00 },
      { time: 0.12, progress: 0.20 },
      { time: 0.84, progress: 0.54 },
      { time: 1.00, progress: 1.00 }
    ];
    var DRAW_SPEED_STOPS_SMALL = [
      { time: 0.00, progress: 0.00 },
      { time: 0.10, progress: 0.28 },
      { time: 0.78, progress: 0.68 },
      { time: 1.00, progress: 1.00 }
    ];
    var DRAW_SPEED_STOPS_MOBILE = [
      { time: 0.00, progress: 0.00 },
      { time: 0.16, progress: 0.08 },
      { time: 0.78, progress: 0.38 },
      { time: 0.90, progress: 0.50 },
      { time: 1.00, progress: 1.00 }
    ];
    var DRAW_SPEED_STOPS =
      w < 768 ? DRAW_SPEED_STOPS_MOBILE :
      w >= 1800 ? DRAW_SPEED_STOPS_1920 :
      w >= 1380 ? DRAW_SPEED_STOPS_DESKTOP :
      w >= 1200 ? DRAW_SPEED_STOPS_1280 :
      DRAW_SPEED_STOPS_SMALL;

    var pathEl = document.getElementById('preloader-path-1');

    function getDrawProgress(time) {
      if (time <= 0) return 0;
      if (time >= 1) return 1;

      for (var i = 0; i < DRAW_SPEED_STOPS.length - 1; i++) {
        var start = DRAW_SPEED_STOPS[i];
        var end = DRAW_SPEED_STOPS[i + 1];

        if (time >= start.time && time <= end.time) {
          var localTime = (time - start.time) / (end.time - start.time);
          return start.progress + ((end.progress - start.progress) * localTime);
        }
      }

      return 1;
    }

    function animatePath(startTime) {
      function frame(now) {
        var elapsed = Math.max(0, now - startTime);
        var time = Math.min(elapsed / DURATION, 1);
        var progress = getDrawProgress(time);

        pathEl.style.strokeDashoffset = (1 - progress).toFixed(4);

        if (time < 1) {
          requestAnimationFrame(frame);
        } else {
          pathEl.style.strokeDashoffset = '0';
        }
      }

      requestAnimationFrame(frame);
    }

    if (pathEl) {
      pathEl.style.strokeDasharray = '1';
      pathEl.style.strokeDashoffset = '1';

      setTimeout(function () {
        requestAnimationFrame(function (now) {
          animatePath(now);
        });
      }, DELAY);
    }

    var WORDS =
      w < 768                                                   ? WORDS_MOBILE :
      w >= 1800                                                  ? WORDS_1920 :
      w >= 1450                                                  ? WORDS_1500 :
      (w >= 1380 && w <= 1500 && h >= 840 && h <= 960)          ? WORDS_1440 :
      w >= 1200                                                  ? WORDS_1280 :
      WORDS_DEFAULT;

    WORDS.forEach(function (item) {
      setTimeout(function () {
        var el = document.getElementById(item.id);
        if (el) el.classList.add('pl-lit');
      }, item.ms);
    });

    setTimeout(function () {
      var wrap = preloader.querySelector('.preloader-text-wrap');
      if (wrap) wrap.style.animation = 'none';
    }, 800);

    var EXIT_AT = DELAY + DURATION + HOLD;

    setTimeout(function () {
      document.documentElement.style.overflow = '';
      preloader.classList.add('wipe-out');
      setTimeout(function () {
        preloader.style.display = 'none';
      }, WIPE_DUR);
    }, EXIT_AT);

  }());
  </script>

</body>
</html>
